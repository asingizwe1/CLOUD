<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask To-Do App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #222;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            padding: 12px 18px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eef4ff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        a {
            text-decoration: none;
            color: white;
            background: #dc2626;
            padding: 8px 12px;
            border-radius: 6px;
        }

        a:hover {
            background: #b91c1c;
        }

        .empty {
            text-align: center;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>My To-Do List</h1>

        <form method="POST">
            <input type="text" name="task" placeholder="Enter a task" required>
            <button type="submit">Add</button>
        </form>

        {% if tasks %}
        <ul>
            {% for task in tasks %}
            <li>
                <span>{{ task.content }}</span>
                <a href="{{ url_for('delete', task_id=task.id) }}">Delete</a>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p class="empty">No tasks added yet.</p>
        {% endif %}
    </div>
</body>

</html>
